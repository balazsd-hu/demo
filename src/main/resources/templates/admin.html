<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Adminisztrációs Felület</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger mb-4">
    <div class="container">
        <a class="navbar-brand font-weight-bold" href="/admin">🔐 Rendszeradminisztráció</a>
        <a href="/" class="btn btn-outline-light btn-sm">👁️ Ügyfél főoldal megtekintése</a>
    </div>
</nav>

<div class="container mb-5">
    <div class="row">

        <div class="col-md-4 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white font-weight-bold">
                    ✨ Új szakember hozzáadása
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/hozzaad}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Teljes név:</label>
                            <input type="text" name="nev" class="form-control" placeholder="Pl. Lakatos Béla" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Kategória:</label>
                            <select name="kategoria" class="form-select">
                                <option value="IT">💻 IT Szakember</option>
                                <option value="Barkács">🪚 Barkács / Szakmunka</option>
                                <option value="Irodai melók">📂 Irodai / Asszisztens</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Óradíj (Ft):</label>
                            <input type="number" name="oradij" class="form-control" placeholder="Pl. 5000" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Profilkép URL:</label>
                            <input type="url" name="kepUrl" class="form-control" value="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150" required>
                            <small class="text-muted d-block mt-1">Fixen beraktam egy alapértelmezett férfi portré linket.</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Képességek / Skillek:</label>
                            <input type="text" name="skillekRaw" class="form-control" placeholder="Pl. PHP, Laravel, HTML (vesszővel elválasztva)" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 mt-2">💾 Szakember mentése</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white font-weight-bold">
                    📋 Aktuális állomány nyilvántartása
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Fotó</th>
                            <th>Név</th>
                            <th>Kategória</th>
                            <th>Óradíj</th>
                            <th>Állapot</th>
                            <th class="text-center">Műveletek</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="munkas : ${munkasok}">
                            <td>
                                <img th:src="${munkas.kepUrl}" alt="Avatar" class="rounded-circle shadow-sm" style="width: 40px; height: 40px; object-fit: cover;">
                            </td>
                            <td><strong th:text="${munkas.nev}">Név</strong></td>
                            <td><span class="badge bg-secondary" th:text="${munkas.kategoria}">Kategória</span></td>
                            <td><span th:text="${munkas.oradij}">0</span> Ft/óra</td>
                            <td>
                                <span th:if="${munkas.elerheto}" class="badge bg-success">🟢 Elérhető</span>

                                <span th:if="${!munkas.elerheto}" class="badge bg-warning text-dark">
        🔴 Foglalt

        <span th:if="${hatralevoIdok != null and hatralevoIdok[munkas.id] != null}"
              th:text="'(' + ${hatralevoIdok[munkas.id]} + ' perc múlva lejár)'"
              class="d-block text-muted small mt-1" style="font-size: 10px;">
        </span>
    </span>
                            </td>
                            <td class="text-center">
                                <div class="d-inline-flex gap-2">
                                    <form th:if="${!munkas.elerheto}" th:action="@{/admin/elerheto/{id}(id=${munkas.id})}" method="post">
                                        <button type="submit" class="btn btn-outline-success btn-sm">🔄 Visszahozás</button>
                                    </form>

                                    <form th:if="${munkas.elerheto}" th:action="@{/admin/foglalt/{id}(id=${munkas.id})}" method="post">
                                        <button type="submit" class="btn btn-outline-warning btn-sm">🔒 Letiltás / Foglalt</button>
                                    </form>
                                        <a th:href="@{/admin/szerkeszt/{id}(id=${munkas.id})}" class="btn btn-outline-primary btn-sm">✏️ Szerkesztés</a>

                                    <form th:action="@{/admin/torol/{id}(id=${munkas.id})}" method="post">
                                        <button type="submit" class="btn btn-outline-danger btn-sm"
                                                th:data-has-booking="${hatralevoIdok != null and hatralevoIdok[munkas.id] != null}"
                                                onclick="return confirm(this.getAttribute('data-has-booking') === 'true' ? '⚠️ FIGYELEM: Ennek a szakembernek jelenleg AKTÍV FOGLALÁSA van! Ha most letörlöd, a foglalási adatai is megsemmisülnek. Biztosan törlöd így is?' : 'Biztosan törlöd ezt a szakembert?')">
                                            🗑️ Törlés
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
