<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Szakember Adatainak Módosítása</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand font-weight-bold" href="/admin">✏️ Szakember Adatainak Szerkesztése</a>
        <a href="/admin" class="btn btn-outline-light btn-sm">⬅️ Vissza az Admin panelre</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white font-weight-bold" th:text="'Szerkesztés: ' + ${munkas.nev}">
                    Szerkesztés
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/szerkeszt/{id}(id=${munkas.id})}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Teljes név:</label>
                            <input type="text" name="nev" class="form-control" th:value="${munkas.nev}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Kategória:</label>
                            <select name="kategoria" class="form-select">
                                <option value="IT" th:selected="${munkas.kategoria == 'IT'}">💻 IT Szakember</option>
                                <option value="Barkács" th:selected="${munkas.kategoria == 'Barkács'}">🪚 Barkács / Szakmunka</option>
                                <option value="Irodai melók" th:selected="${munkas.kategoria == 'Irodai melók'}">📂 Irodai / Asszisztens</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Óradíj (Ft):</label>
                            <input type="number" name="oradij" class="form-control" th:value="${munkas.oradij}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Profilkép URL:</label>
                            <input type="url" name="kepUrl" class="form-control" th:value="${munkas.kepUrl}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Képességek / Skillek (vesszővel elválasztva):</label>
                            <input type="text" name="skillekRaw" class="form-control" th:value="${skillekRaw}" required>
                        </div>

                        <div class="row mt-4">
                            <div class="col-6">
                                <a href="/admin" class="btn btn-secondary w-100">Mégse</a>
                            </div>
                            <div class="col-6">
                                <button type="submit" class="btn btn-primary w-100">💾 Módosítások mentése</button>
                            </div>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
