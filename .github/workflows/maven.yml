name: Java CI with Maven, Tailscale, SonarQube and Docker

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Jogosultságok megadása a Docker Image feltolásához
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Kód letöltése
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Java 17 környezet felépítése
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Csatlakozás a privát Tailscale hálózathoz
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # 4. Fordítás, Tesztelés, JAR artifact legyártása és SonarQube scan
      # emlékezetőül -Dtest=!DemoApplicationTests tesztelés kivétel
      - name: Build, Test and SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          chmod +x mvnw
          ./mvnw clean verify sonar:sonar \
            -Dsonar.projectKey=demo-alkalmazas \
            -Dsonar.host.url=http://192.168.50.223:9000 \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      # 5. Bejelentkezés a GitHub saját Docker tárolójába (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Ezt a jelszót a GitHub magának generálja, nem kell titkos kulcsnak felvinni!

      # 6. A JAR fájl és a Dockerfile összegyúrása, majd az Image feltolása
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest