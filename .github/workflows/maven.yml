name: Java CI with Maven and Artifacts

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Kód letöltése a GitHubról a virtuális gépre
      - uses: actions/checkout@v4

      # 2. A Java 17 környezet felépítése a felhőben
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Tesztek futtatása a Maven Wrapper-rel
      - name: Build and Test with Maven
        run: ./mvnw clean verify

      # 4. A JaCoCo kódlefedettségi jelentés mentése
      - name: Upload JaCoCo Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7